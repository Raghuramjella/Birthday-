
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Udayasri</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    font-family:Arial;
    overflow:hidden;
    color:white;
    text-align:center;
}

h1{
    font-size:60px;
    animation: glow 2s infinite alternate;
}

p{
    font-size:24px;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #fff;}
    to{ text-shadow:0 0 30px #ff00ff;}
}

/* balloons */

.balloon{
    position:absolute;
    bottom:-120px;
    width:50px;
    height:70px;
    border-radius:50%;
    animation: float 7s infinite;
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

/* fireworks */

.firework{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation: explode 1.5s infinite;
}

@keyframes explode{
0%{transform:scale(0);}
50%{transform:scale(6);opacity:1;}
100%{transform:scale(10);opacity:0;}
}
</style>
</head>

<body>

<div>
<h1>🎉 Happy Birthday Udayasri 🎂</h1>
<p>May your day be filled with happiness, smiles and success!</p>
</div>

<!-- Balloons -->

<div class="balloon" style="left:10%;background:red;"></div>
<div class="balloon" style="left:30%;background:blue;animation-delay:1s;"></div>
<div class="balloon" style="left:50%;background:green;animation-delay:2s;"></div>
<div class="balloon" style="left:70%;background:yellow;animation-delay:3s;"></div>
<div class="balloon" style="left:90%;background:pink;animation-delay:4s;"></div>

<!-- Fireworks -->

<div class="firework" style="top:20%;left:20%;"></div>
<div class="firework" style="top:30%;left:70%;animation-delay:0.5s;"></div>
<div class="firework" style="top:50%;left:40%;animation-delay:1s;"></div>
<div class="firework" style="top:70%;left:60%;animation-delay:1.5s;"></div>

<!-- Birthday Music -->

<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

</body>
</html>
